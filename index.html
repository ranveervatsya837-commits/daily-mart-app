<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyMart - Everything you need, one place</title>
<style>
  :root {
    --green: #1a7a3e;
    --green-dark: #145c30;
    --cream: #fdfbf6;
    --ink: #1f2420;
    --gray: #6b7268;
    --line: #e5e2d8;
    --accent: #e8622c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--cream);
    color: var(--ink);
  }
  header {
    background: var(--green);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: #c9f2d6; }
  .search-bar { flex: 1; max-width: 480px; margin: 0 20px; }
  .search-bar input { width: 100%; padding: 9px 14px; border-radius: 6px; border: none; font-size: 14px; }
  .cart-btn { background: var(--accent); color: white; border: none; padding: 9px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
  .categories { display: flex; gap: 10px; padding: 14px 20px; overflow-x: auto; background: white; border-bottom: 1px solid var(--line); }
  .cat-chip { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--line); background: white; font-size: 13px; font-weight: 600; color: var(--gray); cursor: pointer; white-space: nowrap; }
  .cat-chip.active { background: var(--green); color: white; border-color: var(--green); }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
  .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .card { background: white; border: 1px solid var(--line); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; }
  .card .emoji { font-size: 40px; text-align: center; padding: 10px 0; }
  .card .name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .card .unit { font-size: 12px; color: var(--gray); margin-bottom: 8px; }
  .card .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .card .price { font-weight: 700; font-size: 14px; }
  .add-btn { background: white; border: 1.5px solid var(--green); color: var(--green); font-weight: 700; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .add-btn:hover { background: var(--green); color: white; }
  .qty-control { display: flex; align-items: center; gap: 8px; background: var(--green); border-radius: 6px; padding: 3px 6px; }
  .qty-control button { background: none; border: none; color: white; font-size: 16px; font-weight: 700; cursor: pointer; width: 20px; }
  .qty-control span { color: white; font-weight: 700; font-size: 13px; }
  .cart-panel { position: fixed; top: 0; right: -360px; width: 340px; height: 100%; background: white; box-shadow: -4px 0 16px rgba(0,0,0,0.15); transition: right 0.25s ease; z-index: 20; display: flex; flex-direction: column; }
  .cart-panel.open { right: 0; }
  .cart-header { padding: 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .cart-items { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .cart-footer .payment-modes {
    margin-bottom: 14px;
  }
  .payment-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .pay-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .pay-option input {
    cursor: pointer;
  }
  .total-row { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 12px; }
  .checkout-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 15; }
  .overlay.show { display: block; }
  .empty-cart { text-align: center; color: var(--gray); padding: 40px 0; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">Daily<span>Mart</span></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search for fruits, veggies, electronics...">
  </div>
  <button class="cart-btn" onclick="toggleCart(true)">🛒 Cart (<span id="cartCount">0</span>)</button>
</header>

<div class="categories" id="categoryBar"></div>
<main id="main"></main>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <strong>Your Cart</strong>
    <button onclick="toggleCart(false)" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="payment-modes">
      <div class="payment-title">Select Payment Mode</div>
      <label class="pay-option"><input type="radio" name="payment" value="Cash on Delivery" checked> Cash on Delivery</label>
      <label class="pay-option"><input type="radio" name="payment" value="UPI"> UPI</label>
      <label class="pay-option"><input type="radio" name="payment" value="Card"> Card</label>
    </div>
    <div class="total-row"><span>Total</span><span id="cartTotal">₹0</span></div>
    <button class="checkout-btn" onclick="checkout()">Place Order</button>
  </div>

<script>
let allProductsCache = [];
let allProductsFull = [];
let cart = {};

async function loadCategories() {
  const res = await fetch("/api/categories");
  const categories = await res.json();
  const bar = document.getElementById("categoryBar");
  bar.innerHTML = categories.map(cat =>
    `<button class="cat-chip ${cat === "All" ? "active" : ""}" onclick="selectCategory('${cat}', this)">${cat}</button>`
  ).join("");
}

function selectCategory(cat, el) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderProducts(cat, document.getElementById("searchInput").value);
}

async function renderProducts(category = "All", search = "") {
  const main = document.getElementById("main");
  const url = `/api/products?category=${encodeURIComponent(category)}&search=${encodeURIComponent(search)}`;
  const res = await fetch(url);
  const filtered = await res.json();
  allProductsCache = filtered;

  if (filtered.length === 0) {
    main.innerHTML = `<p style="text-align:center;color:var(--gray);padding:60px 0;">No products found.</p>`;
    return;
  }

  const grouped = {};
  filtered.forEach(p => {
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });

  main.innerHTML = Object.entries(grouped).map(([cat, items]) => `
    <div class="section-title">${cat}</div>
    <div class="grid">
      ${items.map(p => productCard(p)).join("")}
    </div>
  `).join("");
}

function productCard(p) {
  const qty = cart[p.id] || 0;
  return `
    <div class="card">
      <div class="emoji">${p.emoji}</div>
      <div class="name">${p.name}</div>
      <div class="unit">${p.unit}</div>
      <div class="price-row">
        <span class="price">₹${p.price}</span>
        ${qty === 0
          ? `<button class="add-btn" onclick="addToCart(${p.id})">ADD</button>`
          : `<div class="qty-control">
               <button onclick="changeQty(${p.id}, -1)">−</button>
               <span>${qty}</span>
               <button onclick="changeQty(${p.id}, 1)">+</button>
             </div>`
        }
      </div>
    </div>
  `;
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  refreshAll();
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  refreshAll();
}

function refreshAll() {
  const activeCat = document.querySelector(".cat-chip.active")?.textContent || "All";
  renderProducts(activeCat, document.getElementById("searchInput").value);
  renderCart();
  updateCartCount();
}

function renderCart() {
  const cartItems = document.getElementById("cartItems");
  const ids = Object.keys(cart);
  if (ids.length === 0) {
    cartItems.innerHTML = `<div class="empty-cart">Your cart is empty.<br>Add some products to get started.</div>`;
    document.getElementById("cartTotal").textContent = "₹0";
    return;
  }
  let total = 0;
  cartItems.innerHTML = ids.map(id => {
    const p = allProductsFull.find(p => p.id == id);
    const qty = cart[id];
    const subtotal = p.price * qty;
    total += subtotal;
    return `
      <div class="cart-item">
        <span>${p.emoji} ${p.name} × ${qty}</span>
        <span>₹${subtotal}</span>
      </div>
    `;
  }).join("");
  document.getElementById("cartTotal").textContent = "₹" + total;
}

function updateCartCount() {
  const count = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById("cartCount").textContent = count;
}

function toggleCart(open) {
  document.getElementById("cartPanel").classList.toggle("open", open);
  document.getElementById("overlay").classList.toggle("show", open);
}

function checkout() {
  if (Object.keys(cart).length === 0) {
    alert("Your cart is empty!");
    return;
  }
  const selectedMode = document.querySelector('input[name="payment"]:checked').value;
  alert(`Order placed via ${selectedMode}! (This is a demo — no real payment is connected yet.)`);
  cart = {};
  refreshAll();
  toggleCart(false);
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const activeCat = document.querySelector(".cat-chip.active")?.textContent || "All";
  renderProducts(activeCat, e.target.value);
});

async function loadFullProductList() {
  const res = await fetch("/api/products");
  allProductsFull = await res.json();
}

async function init() {
  await loadFullProductList();
  await loadCategories();
  await renderProducts();
}
init();
</script>

</body>
</html>
